<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lexiverse · Vocab Browser · 词库浏览</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="lexiverse-ui/liquid-glass.css" />
<style>
  body { height: 100vh; overflow: hidden; }
  #app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; padding: 14px 16px; gap: 12px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 20px; border-radius: var(--r-pill); flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg,#BFF6FF,var(--cyan) 45%,var(--cyan-deep)); box-shadow: 0 4px 14px rgba(56,189,248,0.45), inset 0 1px 0 rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; color: var(--ink); font-weight: 700; }
  .brand .app { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .brand .page { font-size: 15px; font-weight: 700; }
  .topbar .right { display: flex; gap: 10px; }

  .layout { flex: 1; min-height: 0; display: grid; grid-template-columns: 250px 1fr 380px; gap: 12px; }
  .col { min-height: 0; display: flex; flex-direction: column; border-radius: var(--r-lg); overflow: hidden; }
  .col__head { padding: 16px 18px 12px; flex-shrink: 0; }
  .col__body { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 16px 18px; }

  /* filters */
  .fgroup { margin-bottom: 18px; }
  .fgroup .lg-sec { display: block; margin: 0 2px 9px; }
  .fpills { display: flex; flex-wrap: wrap; gap: 7px; }
  .fpill { font-size: 12px; padding: 5px 11px; border-radius: var(--r-pill); cursor: pointer; user-select: none;
    background: rgba(255,255,255,0.045); border: 1px solid var(--glass-border); color: var(--text-dim); transition: all 0.15s var(--ease); }
  .fpill:hover { color: var(--text); border-color: var(--glass-border-strong); }
  .fpill.on { color: var(--ink); font-weight: 700; background: linear-gradient(135deg,#CFF7FF,var(--cyan)); border-color: transparent; box-shadow: 0 3px 12px rgba(126,249,255,0.3); }
  .clearf { margin-top: 4px; font-size: 11.5px; color: var(--text-muted); background: none; border: none; cursor: pointer; font-family: inherit; padding: 2px; }
  .clearf:hover { color: var(--cyan); }

  /* center list */
  .searchrow { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .searchrow .lg-input { flex: 1; }
  .count { font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); padding: 0 2px 10px; }
  .count b { color: var(--cyan); }
  .wcard { padding: 13px 15px; border-radius: var(--r-md); margin-bottom: 9px; cursor: pointer;
    background: var(--glass-fill-soft); border: 1px solid var(--glass-border); transition: all 0.16s var(--ease); }
  .wcard:hover { transform: translateX(2px); border-color: var(--glass-border-strong); }
  .wcard.sel { border-color: rgba(126,249,255,0.6); box-shadow: var(--glow-cyan-sm); background: var(--glass-fill); }
  .wcard .top { display: flex; align-items: center; gap: 9px; }
  .wcard .w { font-size: 17px; font-weight: 700; color: var(--pearl); }
  .wcard .ipa { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
  .wcard .state { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
  .wcard .def { font-size: 12.5px; color: var(--text-dim); margin-top: 5px; line-height: 1.45; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* right preview */
  .pv-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 13px; text-align: center; padding: 30px; }
  .pv .w { font-size: 40px; font-weight: 700; letter-spacing: -0.03em; color: var(--pearl); line-height: 1; }
  .pv .ipa-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .pv .ipa { font-family: var(--font-mono); color: var(--cyan); font-size: 15px; }
  .pv .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
  .pv .def { font-size: 15px; line-height: 1.55; color: var(--text); margin-top: 18px; }
  .pv .def-zh { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
  .pv .ex { margin-top: 16px; padding: 14px 16px; border-radius: var(--r-md); font-size: 14px; line-height: 1.5; color: var(--text-soft); }
  .pv .ex .zh { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; }
  .pv .acts { display: flex; flex-direction: column; gap: 9px; margin-top: 20px; }

  .menu-btn { display: none; }
  @media (max-width: 1040px) {
    .layout { grid-template-columns: 1fr 360px; }
    #filterCol { position: fixed; inset: 14px auto 14px 14px; width: 280px; z-index: 50; transform: translateX(-120%); transition: transform 0.4s var(--ease); }
    #filterCol.open { transform: translateX(0); }
    .menu-btn { display: inline-flex; }
  }
  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    #previewCol { position: fixed; inset: auto 0 0 0; height: 64vh; z-index: 50; border-radius: var(--r-lg) var(--r-lg) 0 0; transform: translateY(110%); transition: transform 0.4s var(--ease); }
    #previewCol.open { transform: translateY(0); }
    .seg-scroll { overflow-x: auto; }
  }
</style>
</head>
<body>
  <div class="cosmic-bg"></div>
  <div id="app">
    <header class="topbar lg-surface">
      <div class="brand">
        <div class="logo">L</div>
        <div><div class="app">LexiOcean</div><div class="page">Lexiverse · 词库浏览</div></div>
      </div>
      <div class="seg-scroll lg-segmented" role="tablist">
        <button class="lg-seg is-active">VOCAB</button>
        <button class="lg-seg" disabled>GRAMMAR<span class="future">future</span></button>
        <button class="lg-seg" disabled>EXAM<span class="future">future</span></button>
        <button class="lg-seg" disabled>REVIEW<span class="future">future</span></button>
      </div>
      <div class="right">
        <button class="lg-icon-btn menu-btn" title="Filters" onclick="document.getElementById('filterCol').classList.toggle('open')">⚟</button>
        <button class="lg-icon-btn" title="Settings">⚙</button>
      </div>
    </header>

    <div class="layout">
      <!-- left filters -->
      <aside class="col lg-panel" id="filterCol" style="padding:0">
        <div class="col__head"><span class="lg-sec">Filters · 筛选</span></div>
        <div class="col__body lg-scroll" id="filters"></div>
      </aside>

      <!-- center list -->
      <section class="col lg-panel" style="padding:0">
        <div class="col__head">
          <div class="searchrow">
            <input class="lg-input" id="search" placeholder="Search words · 搜索单词" autocomplete="off" />
          </div>
          <div class="count" id="count"></div>
        </div>
        <div class="col__body lg-scroll" id="list"></div>
      </section>

      <!-- right preview -->
      <aside class="col lg-panel" id="previewCol" style="padding:0">
        <div class="col__body lg-scroll" id="preview" style="padding:26px 24px"></div>
      </aside>
    </div>
  </div>

  <script src="lexiverse-ui/lexiverse-mock.js"></script>
  <script>
    const M = window.LexiverseMock;
    const F = { cefr: new Set(), pos: new Set(), exam: new Set(), theme: new Set(), state: new Set() };
    let selectedId = M.WORDS[0].id, query = '';

    function speak(t){ try{ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=0.92; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }

    const FILTER_DEFS = [
      { key: 'cefr',  label: 'CEFR · 等级',       values: M.CEFR },
      { key: 'pos',   label: 'Part of Speech · 词性', values: M.POS },
      { key: 'exam',  label: 'Exam Tags · 考试',  values: M.EXAMS },
      { key: 'theme', label: 'Theme / Domain · 主题领域', values: M.THEMES },
      { key: 'state', label: 'Learning State · 状态', values: ['mastered','learning','review','weak','unknown','recommended'] },
    ];

    function renderFilters() {
      document.getElementById('filters').innerHTML = FILTER_DEFS.map(f => `
        <div class="fgroup">
          <span class="lg-sec">${f.label}</span>
          <div class="fpills">
            ${f.values.map(v => `<span class="fpill ${F[f.key].has(v)?'on':''}" data-k="${f.key}" data-v="${v}">${v}</span>`).join('')}
          </div>
        </div>`).join('') + `<button class="clearf" id="clearf">✕ Clear all filters · 清除</button>`;
      document.querySelectorAll('.fpill').forEach(p => p.onclick = () => {
        const k = p.dataset.k, v = p.dataset.v;
        F[k].has(v) ? F[k].delete(v) : F[k].add(v);
        renderFilters(); renderList();
      });
      document.getElementById('clearf').onclick = () => { Object.values(F).forEach(s => s.clear()); renderFilters(); renderList(); };
    }

    function matches(w) {
      if (F.cefr.size && !F.cefr.has(w.cefr)) return false;
      if (F.pos.size && !F.pos.has(w.pos)) return false;
      if (F.exam.size && !w.examTags.some(t => F.exam.has(t))) return false;
      if (F.theme.size && !w.themeTags.some(t => F.theme.has(t))) return false;
      if (F.state.size && !F.state.has(w.learningState)) return false;
      if (query && !(w.word.includes(query) || w.defEn.toLowerCase().includes(query) || w.defZh.includes(query))) return false;
      return true;
    }

    function renderList() {
      const rows = M.WORDS.filter(matches);
      document.getElementById('count').innerHTML = `<b>${rows.length}</b> / ${M.WORDS.length} words · 个结果`;
      document.getElementById('list').innerHTML = rows.length ? rows.map(w => `
        <div class="wcard ${w.id===selectedId?'sel':''}" data-id="${w.id}">
          <div class="top">
            <span class="w">${w.word}</span>
            <span class="ipa">${w.ipa}</span>
            <span class="state" style="background:${M.STATE_COLOR[w.learningState]};box-shadow:0 0 7px ${M.STATE_COLOR[w.learningState]}"></span>
          </div>
          <div style="display:flex;gap:6px;margin-top:7px"><span class="lg-badge lg-badge--mono" style="--c:var(--cyan)">${w.cefr}</span><span class="lg-badge" style="--c:var(--violet)">${w.pos}</span></div>
          <div class="def">${w.defEn}</div>
        </div>`).join('') : `<div style="color:var(--text-muted);font-size:13px;padding:20px 6px">No words match · 没有匹配的单词</div>`;
      document.querySelectorAll('.wcard').forEach(c => c.onclick = () => { selectedId = c.dataset.id; renderList(); renderPreview(); if (innerWidth <= 720) document.getElementById('previewCol').classList.add('open'); });
    }

    function renderPreview() {
      const w = M.byId[selectedId];
      const el = document.getElementById('preview');
      if (!w) { el.innerHTML = `<div class="pv-empty">Select a word · 选择一个单词</div>`; return; }
      const c = M.STATE_COLOR[w.learningState];
      el.className = 'col__body lg-scroll pv';
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px">
          <span class="w">${w.word}</span>
          <button class="lg-icon-btn lg-icon-btn--sm" title="Play · 朗读" onclick="speak('${w.word}')">▶</button>
        </div>
        <div class="ipa-row"><span class="ipa">${w.ipa}</span><span style="color:var(--text-dim);font-style:italic;font-size:13px">${w.pos}</span></div>
        <div class="badges">
          <span class="lg-badge lg-badge--mono" style="--c:var(--cyan)">CEFR ${w.cefr}</span>
          <span class="lg-badge" style="--c:${c}"><span class="dot"></span>${M.STATE_LABEL[w.learningState]}</span>
          ${w.examTags.map(t=>`<span class="lg-badge lg-badge--mono" style="--c:var(--amber)">${t}</span>`).join('')}
        </div>
        <div class="def">${w.defEn}</div>
        <div class="def-zh">${w.defZh}</div>
        <div class="ex lg-card">${w.exampleEn}<div class="zh">${w.exampleZh}</div></div>
        <div class="acts">
          <button class="lg-btn lg-btn--primary">Add to Review · 加入复习</button>
          <button class="lg-btn" onclick="location.href='Lexiverse Quiz Center.html'">Quiz · 测验</button>
          <button class="lg-btn">Ask AI · 问 AI</button>
          <button class="lg-btn lg-btn--ghost" onclick="location.href='Lexiverse Word Detail.html'">See Related Words · 关联词 ↗</button>
        </div>`;
    }

    document.getElementById('search').oninput = (e) => { query = e.target.value.toLowerCase().trim(); renderList(); };
    renderFilters(); renderList(); renderPreview();
  </script>
</body>
</html>
