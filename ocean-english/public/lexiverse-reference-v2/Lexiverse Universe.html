<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Lexiverse Universe · 词汇宇宙 (Stage A prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #040407; color: #ECFBFF;
    font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #stage { position: fixed; inset: 0; }
  #universe-wrap { position: absolute; inset: 0; }
  #universe-wrap canvas { display: block; }

  /* shared liquid surface */
  .liquid { background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14);
    border-radius: 14px; backdrop-filter: blur(18px) saturate(1.15); -webkit-backdrop-filter: blur(18px) saturate(1.15);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45); }
  .liquid::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(126,249,255,0.6), transparent); pointer-events: none; }

  /* ── Top: breadcrumb + return ── */
  #topbar { position: absolute; top: 0; left: 0; right: 0; padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between; z-index: 6; pointer-events: none; }
  #breadcrumb { font-size: 13px; pointer-events: auto; }
  #breadcrumb .home { background: transparent; border: none; color: #7EF9FF; font-family: inherit; font-size: inherit; font-weight: 700; cursor: pointer; padding: 0; }
  #breadcrumb .sep { color: rgba(159,182,198,0.35); margin: 0 8px; }
  #breadcrumb .crumb-constellation { color: #9FB6C6; }
  #breadcrumb .crumb-galaxy { color: #ECFBFF; font-weight: 600; }
  #breadcrumb .crumb-galaxy-zh { color: #9FB6C6; }
  #breadcrumb:not(.with-trail) .sep, #breadcrumb:not(.with-trail) .crumb-constellation,
  #breadcrumb:not(.with-trail) .crumb-galaxy, #breadcrumb:not(.with-trail) .crumb-galaxy-zh { display: none; }

  #return-btn { display: none; padding: 9px 14px; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600; color: #9FB6C6;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(126,249,255,0.14);
    backdrop-filter: blur(12px); pointer-events: auto; align-items: center; gap: 6px; }
  #return-btn:hover { border-color: rgba(126,249,255,0.5); color: #7EF9FF; }

  /* ── Top-right: search + filter ── */
  #right-stack { position: absolute; top: 60px; right: 20px; z-index: 6;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
  .liquid-input-wrap { position: relative; width: 260px; }
  #search { width: 100%; padding: 9px 14px; border-radius: 11px;
    background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14); color: #ECFBFF;
    font-family: inherit; font-size: 13px; outline: none;
    backdrop-filter: blur(18px) saturate(1.15); -webkit-backdrop-filter: blur(18px) saturate(1.15); }
  #search:focus { border-color: rgba(126,249,255,0.45); }
  #search-results { position: absolute; top: calc(100% + 6px); left: 0; right: 0; display: none;
    background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14); border-radius: 10px;
    backdrop-filter: blur(12px); padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.45); }
  #search-results button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 9px;
    border-radius: 7px; background: transparent; border: none; cursor: pointer; color: #ECFBFF;
    font-family: inherit; font-size: 12.5px; text-align: left; }
  #search-results button:hover { background: rgba(126,249,255,0.06); }
  #search-results .dot { width: 9px; height: 9px; border-radius: 50%; }
  #search-results .zh { color: #6F8AA0; font-size: 11px; margin-left: 2px; }

  #filter-bar { display: inline-flex; background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14);
    border-radius: 10px; padding: 3px; backdrop-filter: blur(12px); }
  #filter-bar button { padding: 5px 11px; border-radius: 7px; font-size: 11.5px; font-weight: 600; cursor: pointer;
    background: transparent; border: none; color: #6F8AA0; font-family: inherit; transition: all 0.16s ease; }
  #filter-bar button.active { background: rgba(126,249,255,0.18); color: #7EF9FF; }

  /* ── Hover preview tooltip ── */
  #preview { position: absolute; left: 22px; top: 60px; width: 280px; z-index: 6; padding: 14px;
    background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14); border-radius: 12px;
    backdrop-filter: blur(18px); box-shadow: 0 14px 36px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.22s ease; pointer-events: none; }
  #preview .row { display: flex; gap: 10px; align-items: flex-start; }
  #preview .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  #preview .head .title { font-size: 14px; font-weight: 700; letter-spacing: -0.005em; }
  #preview .head .zh { font-size: 12px; color: #9FB6C6; }
  #preview .desc { font-size: 12px; color: #DCEAF2; line-height: 1.55; margin-top: 8px; }
  #preview .desc.zh-desc { color: #8AA2B2; }
  #preview .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  #preview .chip { font-size: 10.5px; padding: 2px 7px; border-radius: 4px; color: #7EF9FF; border: 1px solid rgba(126,249,255,0.3); background: rgba(126,249,255,0.06); font-family: 'Space Mono', monospace; }
  #preview .chip.muted { color: #9FB6C6; border-color: rgba(159,182,198,0.18); background: rgba(255,255,255,0.02); }

  /* ── Bottom-left HUD ── */
  .hud { position: absolute; bottom: 20px; left: 22px; z-index: 6; padding: 14px 16px; min-width: 240px;
    position: absolute; background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14);
    border-radius: 14px; backdrop-filter: blur(18px); }
  .hud .title { font-size: 10px; letter-spacing: 0.14em; color: rgba(126,249,255,0.55); font-family: 'Space Mono', monospace; margin-bottom: 10px; }
  .hud .stats { display: flex; gap: 22px; }
  .hud .stat b { display: block; font-size: 17px; font-weight: 700; color: #7EF9FF; font-family: 'Space Mono', monospace; line-height: 1; }
  .hud .stat span { display: block; font-size: 10px; color: #6F8AA0; margin-top: 3px; letter-spacing: 0.02em; }

  /* ── Legend bottom-right ── */
  #legend { position: absolute; bottom: 20px; right: 20px; z-index: 6; padding: 10px;
    background: rgba(10,14,24,0.62); border: 1px solid rgba(126,249,255,0.14); border-radius: 14px;
    backdrop-filter: blur(18px); display: flex; flex-direction: column; gap: 5px; }
  #legend .row { display: flex; align-items: center; gap: 8px; }
  #legend .ring { width: 10px; height: 10px; border-radius: 50%; }
  #legend .t { font-size: 10.5px; color: #9FB6C6; font-family: 'Space Mono', monospace; }
  #legend .t b { color: #CFE6F2; font-weight: 400; }

  /* ── Galaxy labels ── */
  .lv-label { position: absolute; left: 0; top: 0; white-space: nowrap; font-size: 12px;
    color: #ECFBFF; text-align: center; transition: opacity 0.2s ease; pointer-events: none;
    text-shadow: 0 0 8px rgba(0,0,0,0.95), 0 1px 3px rgba(0,0,0,0.95); }
  .lv-label b { font-weight: 700; }
  .lv-label span { font-size: 10px; opacity: 0.75; }

  /* ── Detail drawer ── */
  #detail { position: absolute; top: 0; right: 0; bottom: 0; width: 400px; max-width: 100vw; z-index: 8;
    background: linear-gradient(180deg, rgba(9,12,22,0.88), rgba(6,9,16,0.94));
    border-left: 1px solid rgba(126,249,255,0.14); backdrop-filter: blur(22px) saturate(1.2);
    box-shadow: -30px 0 80px rgba(0,0,0,0.6);
    transform: translateX(102%); transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
  #detail.open { transform: translateX(0); }
  #detail::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(126,249,255,0.55), transparent); pointer-events: none; }
  #close-btn { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(126,249,255,0.14); background: rgba(255,255,255,0.04); color: #9FB6C6; cursor: pointer;
    font-size: 15px; display: flex; align-items: center; justify-content: center; }
  #close-btn:hover { border-color: rgba(126,249,255,0.4); color: #7EF9FF; }
  #detail-body { padding: 32px 28px; overflow-y: auto; height: 100%; }
  #detail-body .badge { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600;
    padding: 4px 11px; border-radius: 999px; font-family: 'Space Mono', monospace; }
  #detail-body .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  #detail-body h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; color: #ECFBFF; margin-top: 14px; line-height: 1; }
  #detail-body .subtitle { font-size: 16px; color: #9FB6C6; margin-top: 4px; }
  #detail-body .constellation { font-size: 12px; color: #6F8AA0; margin-top: 10px; font-family: 'Space Mono', monospace; }
  #detail-body .sec { font-size: 10px; letter-spacing: 0.14em; color: rgba(126,249,255,0.55); font-family: 'Space Mono', monospace; margin: 24px 0 10px; }
  #detail-body .desc { font-size: 14.5px; line-height: 1.6; color: #DCEAF2; }
  #detail-body .desc-zh { font-size: 13px; color: #8AA2B2; margin-top: 5px; }
  #detail-body .filter-block { display: flex; flex-direction: column; gap: 6px; }
  #detail-body .kv { display: flex; gap: 10px; font-size: 12.5px; font-family: 'Space Mono', monospace; }
  #detail-body .kv .k { color: #6F8AA0; min-width: 90px; }
  #detail-body .kv .v { color: #ECFBFF; }
  #detail-body .note { font-size: 12.5px; color: #9FB6C6; line-height: 1.6;
    border-left: 2px solid rgba(126,249,255,0.45); padding: 8px 12px; background: rgba(126,249,255,0.04); border-radius: 0 8px 8px 0; }
  #detail-body .actions { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
  #detail-body .actions button { padding: 12px; border-radius: 12px; font-family: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer; }
  #detail-body .actions .primary { background: linear-gradient(135deg, #7EF9FF, #38BDF8); border: none; color: #04202B; box-shadow: 0 8px 26px rgba(56,189,248,0.32); }
  #detail-body .actions .ghost { background: rgba(255,255,255,0.03); border: 1px solid rgba(159,182,198,0.18); color: #9FB6C6; }
  #detail-body .actions .ghost:hover { border-color: rgba(126,249,255,0.4); color: #ECFBFF; }
</style>
</head>
<body>
  <div id="stage">
    <div id="universe-wrap"></div>

    <header id="topbar">
      <nav id="breadcrumb">
        <button class="home">Lexiverse</button>
        <span class="sep">/</span>
        <span class="crumb-constellation"></span>
        <span class="sep">/</span>
        <span class="crumb-galaxy"></span>
        <span class="crumb-galaxy-zh"></span>
      </nav>
      <button id="return-btn">↑ Return to universe · 返回宇宙</button>
    </header>

    <div id="preview"></div>

    <div id="right-stack">
      <div class="liquid-input-wrap">
        <input id="search" placeholder="Search galaxy · 搜索星系" aria-label="Search galaxies" autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div id="filter-bar">
        <button data-filter="all" class="active">All · 全部</button>
        <button data-filter="theme">Theme · 主题</button>
        <button data-filter="domain">Domain · 领域</button>
        <button data-filter="exam">Exam · 考试</button>
        <button data-filter="cefr">CEFR</button>
      </div>
    </div>

    <div id="universe-hud" class="hud">
      <div class="title">YOUR LEXIVERSE · 词汇宇宙</div>
      <div class="stats">
        <div class="stat"><b id="hud-galaxies">42 / 42</b><span>Galaxies in view · 可见</span></div>
        <div class="stat"><b style="color:#FFD66B">—</b><span>Lit words · 已点亮 (Stage C)</span></div>
        <div class="stat"><b style="color:#6BE0A0">—</b><span>In your sky · 入星空 (Stage C)</span></div>
      </div>
    </div>

    <div id="galaxy-hud" class="hud" style="display:none">
      <div class="title">GALAXY VIEW · 星系视图</div>
      <div class="stats">
        <div class="stat"><b style="color:#7EF9FF">—</b><span>Total · 总计 (Stage B)</span></div>
        <div class="stat"><b style="color:#7EF9FF">—</b><span>Learned · 学过 (Stage C)</span></div>
        <div class="stat"><b style="color:#FFA85A">—</b><span>Review · 复习 (Stage C)</span></div>
      </div>
    </div>

    <div id="legend">
      <div class="row"><span class="ring" style="background:#7EF9FF;box-shadow:0 0 6px #7EF9FF"></span><span class="t"><b>Mastered</b> · 已掌握</span></div>
      <div class="row"><span class="ring" style="background:#FFD66B;box-shadow:0 0 6px #FFD66B"></span><span class="t"><b>Recommended</b> · 推荐</span></div>
      <div class="row"><span class="ring" style="background:#38BDF8;box-shadow:0 0 6px #38BDF8"></span><span class="t"><b>Learning</b> · 学习中</span></div>
      <div class="row"><span class="ring" style="background:#FFA85A;box-shadow:0 0 6px #FFA85A"></span><span class="t"><b>Review</b> · 待复习</span></div>
      <div class="row"><span class="ring" style="background:#FF8FA8;box-shadow:0 0 6px #FF8FA8"></span><span class="t"><b>Weak</b> · 薄弱</span></div>
      <div class="row"><span class="ring" style="background:#9FB6C6"></span><span class="t"><b>Unknown</b> · 未学</span></div>
      <div class="row"><span class="ring" style="background:#52617A"></span><span class="t"><b>Locked</b> · 静默</span></div>
    </div>

    <aside id="detail">
      <button id="close-btn">✕</button>
      <div id="detail-body"></div>
    </aside>
  </div>

  <script type="importmap">
  { "imports": {
      "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
  } }
  </script>
  <script src="lexiverse-universe/catalog.js"></script>
  <script type="module" src="lexiverse-universe/ui.js"></script>
  <script src="lv2-bridge.js"></script>
</body>
</html>
