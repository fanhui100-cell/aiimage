version: "3.9"
# DEV ONLY — Do NOT use these credentials in staging/production.
# Override with a secrets manager or environment-specific .env file.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aiimage
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
